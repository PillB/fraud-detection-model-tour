name: CI (Test + Gate)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    - name: Install deps
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install torch --index-url https://download.pytorch.org/whl/cpu  # for VAE if needed
    - name: Run regression gate
      run: python scripts/validate_regression_checklist.py
    - name: Test key toys and pipeline
      run: |
        python experiments/synthetic_fraud_data.py
        python experiments/toy_isolation_forest.py
        python experiments/toy_xgboost.py
        python scripts/full_pipeline.py
    - name: Test compare
      run: python experiments/compare_models.py
    - name: Note for deploy (Fase 5)
      run: echo "Website fully polished and ready for GitHub Pages deploy."
